<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Lý Hồng Linh</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }

        /* Video nền */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%; 
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.4); /* Làm tối để chữ nổi bật */
        }

        /* Card nội dung - Ban đầu sẽ ẩn để chờ bấm nút */
        .home-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            color: white;
            display: none; /* Ẩn lúc đầu */
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }

        .btn-go {
            background-color: #ffffff;
            color: #6c5ce7;
            padding: 15px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-go:hover {
            background-color: #baffff;
            color: white;
            transform: translateY(-5px);
        }

        /* Nút kích hoạt ban đầu */
        #start-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            transition: 0.3s;
        }
        
        #start-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <video loop playsinline id="bg-video">
        <source src="ASSETS/bg.mp4" type="video/mp4">
    </video>

    <button id="start-btn" onclick="startExperience()">Bấm để khám phá ✨</button>

    <div class="home-card" id="main-content">
        <h1>Chào mừng Pro ! 👋</h1>
        <p> Đã đến với lớp DA25TTA</p>
        <a href="html/da25tta.html" class="">Thông tin lớp</a>
    </div>

    <script>
        function startExperience() {
            const video = document.getElementById("bg-video");
            const startBtn = document.getElementById("start-btn");
            const content = document.getElementById("main-content");

            // 1. Phát video (bỏ chế độ tắt tiếng)
            video.muted = false; 
            video.play();

            // 2. Ẩn nút bấm bắt đầu
            startBtn.style.display = "none";

            // 3. Hiện nội dung profile
            content.style.display = "block";
        }
    </script>

</body>
</html>
