<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Thông tin sinh viên</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Chenla">

    <style>
        body {
            background: linear-gradient(to right,#FF7F50 24%,#eba471 100%);
            color: black;
            font-family: 'Chenla', verdana;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
        }

        .container {
            margin-top: 50px;
            text-align: center;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }

        .box1, .box2 {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            display: inline-block;
        }

        .box2 {
            width: 60%;
        }

        table {
            width: 100%;
        }

        td {
            vertical-align: middle;
        }
    </style>
</head>

<body>

    <h1>THÔNG TIN CÁ NHÂN</h1>

    <div class="container">
        <table>
            <tr>
                <td style="text-align:center;">
                    <img src="../assets/img/doy.jpg" alt="Ảnh đại diện">
                </td>

                <td>
                    <div class="box1">
                        <ul>
                            <li>Họ và tên: Đổ Thị Như Ý</li>
                            <li>Năm sinh: 27/05/2007</li>
                            <li>Lớp: DA25TTA</li>
                            <li>Học ở: Đại học Trà Vinh, Khoa Kỹ thuật & Công nghệ</li>
                        </ul>
                    </div>
                </td>
            </tr>
        </table>

        <div class="box2">
            <h2>Sở thích</h2>
            <ul>
                <li>Chơi Bida</li>
            </ul>
        </div>
    </div>

</body>
</html>
